<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAGMENT — Cryptographie Souveraine</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --c1: #00d4ff; --bg: #030509; --txt: #ddeeff; --muted: #4d7a9f;
            --syne: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
        }
        body { background: var(--bg); color: var(--txt); font-family: var(--mono); }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px; background: rgba(3,5,9,0.9); border-bottom: 1px solid #333; }
        .nav-inner { max-width: 1140px; margin: 0 auto; display: flex; justify-content: space-between; }
        
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-t3d { font-family: var(--syne); font-size: 3.5rem; color: #fff; margin-bottom: 20px; }
        .btn-p { display: inline-block; padding: 16px 34px; background: var(--c1); color: #000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <div class="nav-logo">FRAGMENT</div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div>
                <h1 class="hero-t3d">Souveraineté<br>Numérique.</h1>
                <p>La fragmentation XOR 100% locale.</p>
                <br>
                <a href="#" class="btn-p">Télécharger</a>
            </div>
        </section>
    </main>

</body>
</html>
