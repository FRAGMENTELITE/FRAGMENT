<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAGMENT - Open Source Security</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
        .result { word-break: break-all; background: #eee; padding: 10px; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>FRAGMENT (XOR)</h2>
    
    <!-- SECTION FRAGMENTER -->
    <div>
        <h3>Split Secret</h3>
        <input type="text" id="secretInput" placeholder="Enter your secret (Seed phrase...)">
        <button onclick="splitSecret()">Generate Fragments</button>
        <div id="fragA" class="result">Fragment A: -</div>
        <div id="fragB" class="result">Fragment B: -</div>
    </div>

    <hr>

    <!-- SECTION RECONSTITUER -->
    <div>
        <h3>Combine Fragments</h3>
        <input type="text" id="inputA" placeholder="Paste Fragment A">
        <input type="text" id="inputB" placeholder="Paste Fragment B">
        <button onclick="combineFragments()">Recover Secret</button>
        <div id="recoveredSecret" class="result">Recovered: -</div>
    </div>
</div>

<script>
    // Logique de conversion Texte <-> Hexadécimal
    const bxt = s => Array.from(s).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
    const txb = h => h.match(/.{1,2}/g).map(byte => String.fromCharCode(parseInt(byte, 16))).join('');

    function splitSecret() {
        const secret = document.getElementById('secretInput').value;
        if (!secret) return;

        // On génère une clé aléatoire (Fragment B) de la même longueur que le secret
        let fragmentB = "";
        for (let i = 0; i < secret.length; i++) {
            fragmentB += Math.floor(Math.random() * 256).toString(16).padStart(2, '0');
        }

        const hexSecret = bxt(secret);
        let fragmentA = "";

        // Opération XOR entre le secret et le Fragment B pour créer le Fragment A
        for (let i = 0; i < hexSecret.length; i += 2) {
            let sByte = parseInt(hexSecret.substr(i, 2), 16);
            let bByte = parseInt(fragmentB.substr(i, 2), 16);
            fragmentA += (sByte ^ bByte).toString(16).padStart(2, '0');
        }

        document.getElementById('fragA').innerText = "Fragment A: " + fragmentA;
        document.getElementById('fragB').innerText = "Fragment B: " + fragmentB;
    }

    function combineFragments() {
        const a = document.getElementById('inputA').value.trim();
        const b = document.getElementById('inputB').value.trim();
        if (!a || !b) return;

        let hexResult = "";
        for (let i = 0; i < a.length; i += 2) {
            let aByte = parseInt(a.substr(i, 2), 16);
            let bByte = parseInt(b.substr(i, 2), 16);
            hexResult += (aByte ^ bByte).toString(16).padStart(2, '0');
        }

        document.getElementById('recoveredSecret').innerText = "Recovered: " + txb(hexResult);
    }
</script>

</body>
</html>
