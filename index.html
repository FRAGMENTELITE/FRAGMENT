<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#00d4ff;--c1g:rgba(0,212,255,.15);--c1d:rgba(0,212,255,.07);
  --c2:#ff8c42;--c2g:rgba(255,140,66,.12);
  --c3:#00e87a;--red:#ff4d6a;
  --bg:#030509;--bg2:#060b14;--bg3:#080f1d;
  --card:#0a1422;--card2:#0d1c30;
  --border:rgba(255,255,255,.06);--border2:rgba(0,212,255,.2);
  --txt:#ddeeff;--muted:#4d7a9f;--faint:#0c1e35;
  --syne:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:16px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.015) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0}
.z{position:relative;z-index:1}
.w{max-width:1140px;margin:0 auto;padding:0 28px}
.wsm{max-width:820px;margin:0 auto;padding:0 28px}
.wxs{max-width:660px;margin:0 auto;padding:0 28px}

/* NAV */
nav{position:fixed;top:0;left:0;width:100%;z-index:100;background:rgba(3,5,9,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.nav-inner{max-width:1140px;margin:0 auto;padding:0 28px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(0,212,255,.5))}
.nav-logo-txt{font-family:var(--syne);font-weight:800;font-size:1.05rem;letter-spacing:4px;color:#fff}
.nav-links{display:flex;align-items:center;gap:22px}
.nav-links a{font-size:.75rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--c1)}
.nav-cta{font-family:var(--syne);font-size:.72rem;font-weight:700;letter-spacing:1px;padding:9px 20px;border:1px solid var(--c1);color:var(--c1);text-decoration:none;transition:all .2s;white-space:nowrap}
.nav-cta:hover{background:var(--c1);color:#000}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.ham span{width:22px;height:1.5px;background:var(--muted);display:block}

/* MOBILE MENU */
.mob{display:none;position:fixed;inset:0;background:var(--bg);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.mob.open{display:flex}
.mob a{font-family:var(--syne);font-size:1.1rem;font-weight:700;color:var(--txt);text-decoration:none;letter-spacing:2px}
.mob a:hover{color:var(--c1)}
.mob-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 28px 60px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.22;display:block}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(3,5,9,.97) 28%,rgba(3,5,9,.45) 62%,rgba(3,5,9,.72) 100%),linear-gradient(to top,rgba(3,5,9,.95) 0%,transparent 35%)}
.hero-inner{max-width:1140px;margin:0 auto;width:100%;position:relative;z-index:2}

.hero-t3d{font-family:var(--syne);font-size:clamp(1.8rem,5vw,3.5rem);font-weight:800;letter-spacing:-3px;line-height:.88;background:linear-gradient(175deg,#ffffff 0%,#b8dfff 35%,#00d4ff 65%,#0055aa 100%);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block;filter:drop-shadow(0 6px 18px rgba(0,212,255,.38));margin-bottom:14px}
.hero-sub-t{font-family:var(--syne);font-size:clamp(.9rem,2.5vw,1.3rem);font-weight:600;letter-spacing:6px;color:var(--c1);text-transform:uppercase;margin-bottom:18px;opacity:.85}
.hero-desc{font-size:1rem;color:var(--muted);line-height:1.85;max-width:500px;margin-bottom:32px}
.hero-desc strong{color:var(--txt)}
.hero-live{display:inline-flex;align-items:center;gap:9px;padding:9px 18px;background:rgba(0,212,255,.06);border:1px solid var(--border2);font-size:.7rem;letter-spacing:2px;color:var(--muted);margin-bottom:36px}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--c3);box-shadow:0 0 6px var(--c3);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:52px}
.btn-p{font-family:var(--syne);font-size:.85rem;font-weight:700;letter-spacing:1px;padding:16px 34px;background:var(--c1);color:#000;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:all .2s}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,212,255,.3)}
.btn-s{font-family:var(--syne);font-size:.85rem;font-weight:700;letter-spacing:1px;padding:16px 34px;background:transparent;color:var(--txt);border:1px solid var(--border2);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:all .2s}
.btn-s:hover{border-color:var(--c1);color:var(--c1)}
.btn-o{font-family:var(--syne);font-size:.82rem;font-weight:700;letter-spacing:1px;padding:14px 28px;background:var(--c2);color:#000;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.btn-o:hover{filter:brightness(1.1);transform:translateY(-1px)}
.hero-stats{display:flex;gap:44px;flex-wrap:wrap;padding-top:36px;border-top:1px solid var(--border)}

/* TRUST */

/* SECTION */

.infog-num{width:30px;height:30px;font-family:var(--syne);font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#000}
.infog-title{font-family:var(--syne);font-size:1rem;font-weight:700;color:#fff}
.infog-img{width:100%;height:auto;display:block;border:1px solid var(--border2)}
.ic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
@media(max-width:680px){.ic-grid{grid-template-columns:1fr}}
.ic{background:var(--card);border:1px solid var(--border);padding:18px}
.ic-r{border-left:3px solid var(--red)}.ic-c{border-left:3px solid var(--c1)}.ic-g{border-left:3px solid var(--c3)}
.ic-t{font-family:var(--syne);font-size:.88rem;font-weight:700;margin-bottom:7px}
.ic-r .ic-t{color:var(--red)}.ic-c .ic-t{color:var(--c1)}.ic-g .ic-t{color:var(--c3)}

/* VISUELS */
.vis-img{width:100%;height:auto;display:block;border:1px solid var(--border2)}
.v3col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}

.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:60px}
.step{background:var(--card);padding:36px 28px;transition:background .2s}
.step:hover{background:var(--card2)}

.step-t{font-family:var(--syne);font-size:1rem;font-weight:700;color:#fff;margin-bottom:10px}
.step-d{font-size:.82rem;color:var(--muted);line-height:1.75}
@media(max-width:760px){.steps-grid{grid-template-columns:1fr}}

/* PRICING */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:60px}

.pc{background:var(--card);border:1px solid var(--border);padding:32px;position:relative;overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,border-color .25s,box-shadow .25s}

.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}

.pc-elite::before{background:linear-gradient(90deg,var(--c1),var(--c2))}

.pc-hot{border-color:rgba(0,212,255,.3);box-shadow:0 0 40px rgba(0,212,255,.07)}
.pc-bdg{display:inline-block;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;margin-bottom:14px;font-family:var(--mono)}
.pb-l{background:var(--c1d);color:var(--c1);border:1px solid rgba(0,212,255,.2)}
.pb-e{background:linear-gradient(90deg,rgba(0,212,255,.1),rgba(255,140,66,.1));color:#fff;border:1px solid rgba(255,255,255,.12)}

.pc-engine{font-family:var(--mono);font-size:.65rem;letter-spacing:1.5px;color:var(--c1);background:rgba(0,212,255,.06);border:1px solid var(--border2);padding:5px 12px;margin-bottom:12px;display:inline-block}
.pc-engine.e2{color:var(--c2);background:rgba(255,140,66,.06);border-color:rgba(255,140,66,.2)}
.pc-name{font-family:var(--syne);font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:6px}
.pc-price{font-family:var(--syne);font-size:1.9rem;font-weight:800;margin-bottom:4px;line-height:1}
.pc-psub{font-size:.72rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.pc-desc{font-size:.82rem;color:var(--muted);line-height:1.75;margin-bottom:20px;flex:1}
/* FEATURES — coches rondes vertes bien visibles */
.pc-list{list-style:none;margin-bottom:26px;display:flex;flex-direction:column;gap:10px}

.ck{background:var(--c3);color:#000;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;flex-shrink:0;margin-top:1px}
.pc-list .na{color:var(--muted)}
.pc-list .na .ck{background:var(--faint);color:var(--muted)}
.pc-img-wrap{margin-bottom:20px;border:1px solid var(--border);overflow:hidden}
.pc-img-wrap img{width:100%;height:auto;display:block}
.pc-btn{width:100%;padding:14px;font-family:var(--syne);font-size:.8rem;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;border:none;margin-top:auto}

.pb-e-btn{background:linear-gradient(90deg,var(--c1),var(--c2));color:#000}

.pb-c-btn{background:var(--c2);color:#000}

/* CODE */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
@media(max-width:760px){.sec-grid{grid-template-columns:1fr}}
.code-block{background:var(--bg);border:1px solid var(--border);padding:22px;font-family:var(--mono);font-size:.75rem;line-height:2.2;overflow-x:auto}
.cl{display:flex;gap:14px;padding:2px 0}
.cn{color:var(--faint);user-select:none;min-width:20px;text-align:right;flex-shrink:0}
.cc{color:rgba(0,212,255,.32)}.ck-c{color:var(--c1)}.cv{color:var(--c3)}.cop{color:var(--c2)}.ct{color:var(--txt)}

.temo{background:var(--card);border:1px solid var(--border);padding:26px}
.temo-stars{color:var(--c2);font-size:.9rem;margin-bottom:12px;letter-spacing:2px}

/* FAQ */
.faq-list{margin-top:60px;display:flex;flex-direction:column;gap:2px}
