<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAGMENT — Sécurité Souveraine 🇫🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Style simplifié et robuste */
:root{
  --c1:#00d4ff; --bg:#03060d; --card:#0b1425; --txt:#ddeeff; --muted:#5a88b0;
  --syne:'Syne',sans-serif; --mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);margin:0;padding:0;text-align:center;}
nav{padding:20px;border-bottom:1px solid rgba(0,212,255,.1);display:flex;justify-content:center;}
.hero{padding:100px 20px;}
h1{font-family:var(--syne);font-size:3rem;margin-bottom:20px;}
h1 span{color:var(--c1);}
.versions{padding:50px 20px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.version-card{background:var(--card);border:1px solid rgba(0,212,255,.2);padding:30px;width:300px;border-radius:4px;}
.vc-name{font-family:var(--syne);font-size:1.5rem;font-weight:800;margin-bottom:15px;}
.vc-action{display:block;padding:12px;background:var(--c1);color:#000;text-decoration:none;font-weight:700;border-radius:2px;transition:0.2s;}
.vc-action:hover{filter:brightness(1.2);transform:translateY(-2px);}
.va-lite{background:transparent;color:var(--c1);border:1px solid var(--c1);}
</style>
</head>
<body>

<nav><strong>FRAGMENT</strong></nav>

<section class="hero">
  <h1>PROTÉGEZ<br><span>VOS SECRETS</span></h1>
  <p>Système de fragmentation cryptographique XOR local.</p>
</section>

<section class="versions" id="versions">
  <div class="version-card">
    <div class="vc-name">FRAGMENT LITE</div>
    <p>Version gratuite essentielle.</p>
    <a href="https://fragmentarmor.gumroad.com/l/kzbxcv" target="_blank" class="vc-action va-lite">LANCER LITE →</a>
  </div>

  <div class="version-card" style="border-color:var(--c1)">
    <div class="vc-name" style="color:var(--c1)">FRAGMENT ELITE</div>
    <p>Version complète recommandée.</p>
    <a href="https://fragmentarmor.gumroad.com/l/kzbxcv" target="_blank" class="vc-action">LANCER ELITE →</a>
  </div>

  <div class="version-card">
    <div class="vc-name">FRAGMENT CORP</div>
    <p>Version professionnelle B2B.</p>
    <a href="https://fragmentarmor.gumroad.com/l/kzbxcv" target="_blank" class="vc-action va-lite">LANCER CORP →</a>
  </div>
</section>

</body>
</html>
