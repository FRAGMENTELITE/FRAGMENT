<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRAGMENT LITE — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* --- DESIGN SYSTEM (Identique à l'Elite pour la cohérence) --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan: #00f2ff; --orange: #ff8c42; --green: #00ffaa; --red: #ff4d6a;
  --bg: #050a12; --card: #0d1421; --txt: #ffffff; --muted: #4a6a84; --faint: #1e2d40;
  --mich: 'Michroma', sans-serif; --mono: 'JetBrains Mono', monospace; --r: 10px;
}
html, body { min-height: 100%; background: var(--bg); color: var(--txt); font-family: var(--mono); display: flex; flex-direction: column; align-items: center; }
.shell { width: 100%; max-width: 460px; padding: 0 0 60px; position: relative; }

header { text-align: center; padding: 30px 20px; }
.brand { font-family: var(--mich); font-size: 1.5rem; letter-spacing: 5px; color: var(--txt); }
.version-tag { font-size: 0.5rem; color: var(--orange); margin-top: 5px; letter-spacing: 2px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 0 16px 20px; }
.stat-box { background: var(--card); border: 1px solid var(--faint); border-radius: var(--r); padding: 12px; text-align: center; }
.stat-lbl { font-size: 0.4rem; color: var(--muted); text-transform: uppercase; }

.onglets { display: flex; gap: 8px; margin: 0 16px 16px; }
.onglet { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--faint); border-radius: var(--r); color: var(--muted); font-size: 0.5rem; cursor: pointer; }
.onglet.actif { color: var(--cyan); border-color: var(--cyan); }

.panneau { display: none; flex-direction: column; gap: 14px; padding: 0 16px; }
.panneau.actif { display: flex; }

.zone-saisie { background: var(--card); border: 1px solid var(--faint); border-radius: var(--r); padding: 20px; }
.champ-secret { width: 100%; background: #0a111a; border: 1px solid var(--faint); border-radius: 5px; color: #ffffff; font-size: 1.1rem; padding: 15px; min-height: 120px; outline: none; }

.bouton { width: 100%; height: 54px; border: none; border-radius: var(--r); cursor: pointer; font-family: var(--mich); font-size: 0.6rem; font-weight: bold; background: var(--txt); color: var(--bg); }

/* LOCK MESSAGE */
.lock-msg { background: rgba(255,140,66,0.1); border: 1px dashed var(--orange); color: var(--orange); padding: 15px; border-radius: 8px; font-size: 0.6rem; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="brand">FRAGMENT</div>
    <div class="version-tag">ÉDITION LITE (DÉMO)</div>
  </header>

  <div class="stats-grid">
    <div class="stat-box"><span style="color:var(--red)">OFF</span><br><span class="stat-lbl">Registre</span></div>
    <div class="stat-box"><span style="color:var(--orange)">LITE</span><br><span class="stat-lbl">Storage</span></div>
    <div class="stat-box"><span style="color:var(--green)">OK</span><br><span class="stat-lbl">Crypto</span></div>
  </div>

  <div class="panneau actif">
    <div class="zone-saisie">
      <textarea class="champ-secret" id="secretInput" placeholder="TESTER LE CHIFFREMENT..."></textarea>
    </div>
    <button class="bouton" onclick="tester()">FRAGMENTER (DÉMO)</button>
    
    <div id="resultat" style="margin-top:20px; display:none;">
        <div style="font-size:0.6rem; color:var(--cyan); margin-bottom:5px;">FRAGMENT A (TEMPORAIRE) :</div>
        <div id="fragA" style="background:var(--card); padding:10px; font-size:0.5rem; word-break:break-all; border:1px solid var(--faint); margin-bottom:10px;"></div>
        <div style="font-size:0.6rem; color:var(--cyan); margin-bottom:5px;">FRAGMENT B (TEMPORAIRE) :</div>
        <div id="fragB" style="background:var(--card); padding:10px; font-size:0.5rem; word-break:break-all; border:1px solid var(--faint);"></div>
    </div>

    <div class="lock-msg">
      <b>VERSION LIMITÉE :</b> La sauvegarde permanente (Bunker), les QR Codes et l'impression sont réservés aux membres <b>PRO</b> et <b>ELITE</b>.
    </div>
  </div>
</div>

<script>
const Moteur = {
  fragmenter(secret) {
    const octets = new TextEncoder().encode(secret);
    const A = new Uint8Array(octets.length);
    const B = new Uint8Array(octets.length);
    crypto.getRandomValues(A);
    for (let i = 0; i < octets.length; i++) B[i] = octets[i] ^ A[i];
    return { a: btoa(String.fromCharCode(...A)), b: btoa(String.fromCharCode(...B)) };
  }
};

function tester() {
  const s = document.getElementById('secretInput').value;
  if(!s) return alert("ENTREZ UN TEXTE");
  const f = Moteur.fragmenter(s);
  document.getElementById('fragA').textContent = f.a;
  document.getElementById('fragB').textContent = f.b;
  document.getElementById('resultat').style.display = 'block';
}
</script>
</body>
</html>
