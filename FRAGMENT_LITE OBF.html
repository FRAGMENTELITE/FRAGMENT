<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FRAGMENT LITE 🇫🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--led:#00d4ff;--glow:rgba(0,212,255,0.3);--bg:#000;--card:#050507;--line:#141418;--txt:#fff;--dim:#94a3b8;--field:#000}[data-theme="light"]{--bg:#f1f5f9;--card:#fff;--line:#cbd5e1;--txt:#0f172a;--dim:#475569;--field:#fff}body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;transition:0.3s;display:flex;flex-direction:column;align-items:center}.top-bar{width:100%;max-width:440px;display:flex;justify-content:space-between;padding:15px}.theme-toggle{cursor:pointer;background:none;border:1px solid var(--dim);color:var(--txt);padding:5px 12px;border-radius:20px;font-size:0.6rem;font-family:'Michroma'}.nav-links a{color:var(--led);text-decoration:none;font-size:0.6rem;font-family:'Michroma';border:1px solid var(--led);padding:5px 10px;border-radius:2px}.shell{width:100%;max-width:440px;padding:10px 18px}header{text-align:center;margin-bottom:25px}.brand{font-family:'Michroma';font-size:1.4rem;letter-spacing:12px}.brand-lite{font-family:'Michroma';font-size:0.55rem;color:var(--led);margin-top:6px}.btn-upgrade{width:100%;display:block;text-align:center;background:linear-gradient(90deg,#00d4ff,#00ff88);color:#000!important;font-family:'Michroma';font-size:0.6rem;font-weight:bold;padding:15px;margin-bottom:20px;text-decoration:none;box-shadow:0 0 15px var(--glow)}.section{background:var(--card);border:1px solid var(--line);padding:20px;margin-bottom:14px}.section-label{font-family:'Michroma';font-size:0.5rem;color:var(--led);margin-bottom:12px;text-transform:uppercase}.field{background:var(--field);border:1px solid var(--line);padding:12px;margin-bottom:10px;display:flex;align-items:center}.field input{width:100%;border:none;background:transparent;color:var(--txt);font-family:'JetBrains Mono';outline:none}.field input::placeholder{color:var(--dim)}.btn{width:100%;padding:15px;border:1px solid var(--led);background:transparent;color:var(--led);font-family:'Michroma';font-size:0.55rem;cursor:pointer;text-transform:uppercase}.btn:hover{background:rgba(0,212,255,0.1)}.copy-btn{font-size:0.5rem;background:var(--led);color:#000;border:none;padding:4px 8px;cursor:pointer;margin-left:5px;font-family:'Michroma'}.registre{margin-top:20px;border-top:1px solid var(--line);padding-top:20px}.reg-item{font-size:0.6rem;padding:10px;border:1px solid var(--line);margin-bottom:5px;background:var(--card);overflow-x:auto}
#c{font-size:0.5rem;color:var(--dim);margin-left:auto}
</style>
</head>
<body>
<div class="top-bar">
    <button class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme',document.documentElement.getAttribute('data-theme')==='light'?'dark':'light')">🌓 JOUR/NUIT</button>
    <div class="nav-links"><a href="https://www.instagram.com/fragmentelite" target="_blank">INSTAGRAM</a></div>
</div>
<div class="shell">
  <header><div class="brand">FRAGMENT 🇫🇷</div><div class="brand-lite">LITE EDITION</div></header>
  <a href="https://fragmentarmor.gumroad.com/l/kzbxcv" class="btn-upgrade" target="_blank">🚀 UPGRADE ELITE & CORPORATE</a>
  <div class="section">
    <div class="section-label">1. Scinder <span id="c">0/150</span></div>
    <div class="field"><input id="S" maxlength="150" placeholder="..." oninput="G('c').textContent=this.value.length+'/150'"></div>
    <button class="btn" onclick="F()">Fragmenter</button>
    <div id="R" style="display:none;margin-top:10px">
        <div class="field"><input id="fA" readonly><button class="copy-btn" onclick="C('fA')">Copier</button></div>
        <div class="field"><input id="fB" readonly><button class="copy-btn" onclick="C('fB')">Copier</button></div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">2. Reconstituer</div>
    <div class="field"><input id="iA" placeholder="A"></div>
    <div class="field"><input id="iB" placeholder="B"></div>
    <button class="btn" onclick="X()" style="border-color:var(--txt);color:var(--txt)">Reformer</button>
    <div id="v" style="display:none;margin-top:10px;padding:10px;color:var(--led);border:1px solid var(--led);font-size:.7rem"></div>
  </div>
  <div class="registre" id="rg" style="display:none"><div class="section-label">Registre</div><div id="rl"></div></div>
</div>
<script>
const G=i=>document.getElementById(i);
const F=()=>{let s=G('S').value,l=s.length;if(!l)return;if(l>150){alert('!');return}let e=new TextEncoder().encode(s),a=crypto.getRandomValues(new Uint8Array(e.length)),b=e.map((x,i)=>x^a[i]),A=btoa(String.fromCharCode(...a)),B=btoa(String.fromCharCode(...b));G('fA').value=A;G('fB').value=B;G('R').style.display='block';let n=document.createElement('div');n.className='reg-item';n.textContent=`[${new Date().toLocaleTimeString()}] A:${A.slice(0,8)} | B:${B.slice(0,8)}`;G('rl').prepend(n);G('rg').style.display='block'};
const X=()=>{try{let a=Uint8Array.from(atob(G('iA').value),x=>x.charCodeAt(0)),b=Uint8Array.from(atob(G('iB').value),x=>x.charCodeAt(0));G('v').textContent="Secret: "+new TextDecoder().decode(a.map((x,i)=>x^b[i]));G('v').style.display='block'}catch(e){alert('?')}};
const C=i=>{G(i).select();document.execCommand('copy');alert('OK')};
</script>
</body>
</html>
